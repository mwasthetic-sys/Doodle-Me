<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doodle Me</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Patrick+Hand&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Patrick Hand', cursive;
      background-color: #fffbeb;
      -webkit-font-smoothing: antialiased;
    }
    .font-doodle {
      font-family: 'Gochi Hand', cursive;
    }
    .font-jakarta {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .doodle-border {
      border: 3px solid #000;
      border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
    }
    .doodle-shadow {
      box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
    }
    .doodle-shadow-sm {
      box-shadow: 3px 3px 0px 0px rgba(0,0,0,1);
    }
    .doodle-button:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
    }
    .animate-wiggle {
      animation: wiggle 0.3s ease-in-out infinite;
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(-1deg); }
      50% { transform: rotate(1deg); }
    }
    .bg-doodle {
      background-image: url("https://www.transparenttextures.com/patterns/hand-drawn-grid.png");
    }
  </style>
  <script type="importmap">

    "react-dom": "https://esm.sh/react-dom@19.0.0",

    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-50 text-slate-900">

<script type="module" src="/index.tsx"></script>
</body>
</html>
